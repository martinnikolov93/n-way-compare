<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>N-Way Sync</title>
  <style>
    #folders { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .folder-input { width: 500px; }
  </style>
</head>
<body>
  <h2>N-Way Folder Compare Tool</h2>
  <div id="folders">
    <input class="folder-input" placeholder="Folder 1 Source" />
    <input class="folder-input" placeholder="Folder 2" />
  </div>
  <button id="addFolderBtn">Add Folder</button>
  <button onclick="loadConfig()">Load Config</button>
  <button onclick="saveConfig()">Save Config</button>
  <button onclick="scan()">Scan</button>
  <label><input type="checkbox" id="onlyDiff" /> Show only different</label>

  <!-- Legend / Header -->
  <div style="margin:10px 0; padding:8px; border:1px solid #ccc; background:#f9f9f9;">
    <b>Legend:</b>
    <div>
      🔘 <b>Source</b> (radio) → choose which version to copy FROM
    </div>
    <div>
      ☑️ <b>Apply to</b> (checkbox) → choose which targets to copy TO
    </div>
    <div>
      🔴 Red row/cell → file differs between folders
    </div>
    <div>
      ❓ <b>Missing file</b> → file does not exist (can copy here)
    </div>
    <div>
      ❌ <b>Delete</b> → remove file from this folder
    </div>
  </div>

  <!-- Table Header -->
  <div id="tableHeader" style="display:grid; grid-template-columns:300px repeat(10,120px) 120px; font-weight:bold; border-bottom:2px solid black; padding:4px;">
    <div>File</div>
    <!-- dynamic columns inserted by JS -->
    <div id="headerCols"></div>
    <div>Actions</div>
  </div>

  <ul id="fileList"></ul>

  <script src="renderer.js"></script>
  <script>
    const addBtn = document.getElementById('addFolderBtn');
    const foldersDiv = document.getElementById('folders');

    addBtn.addEventListener('click', () => {
      const newInput = document.createElement('input');
      newInput.className = 'folder-input';
      newInput.placeholder = `Folder ${foldersDiv.children.length + 1}`;
      foldersDiv.appendChild(newInput);
    });
  </script>
</body>
</html>
